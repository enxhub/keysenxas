<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENX HUB - Resgatar Key</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#5b21b6,#7c3aed);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:#111827;
    width:90%;
    max-width:500px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.logo{
    font-size:32px;
    color:white;
    font-weight:bold;
    margin-bottom:10px;
}

.sub{
    color:#cbd5e1;
    margin-bottom:25px;
}

.btn{
    background:#7c3aed;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    background:#8b5cf6;
}

.status{
    margin-top:20px;
    color:white;
    font-size:18px;
}

.key-box{
    display:none;
    margin-top:20px;
}

.key{
    background:#1f2937;
    color:#22c55e;
    padding:15px;
    border-radius:10px;
    word-break:break-all;
    margin-bottom:10px;
    font-weight:bold;
}

.copy{
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">ENX HUB</div>
    <div class="sub">Sistema Oficial de Resgate</div>

    <button class="btn" onclick="gerarKey()">
        Resgatar sua Key
    </button>

    <div class="status" id="status"></div>

    <div class="key-box" id="keyBox">
        <div class="key" id="keyText"></div>
        <button class="copy" onclick="copiarKey()">
            Copiar Key
        </button>
    </div>
</div>

<script>

const keys = [
"ENX 71328U8-2758501",

"ENX 86021H5-3633542"
];

function gerarKey(){

    document.getElementById("keyBox").style.display="none";
    document.getElementById("status").innerHTML="🔄 Criando Key...";

    setTimeout(() => {

        const key = keys[Math.floor(Math.random() * keys.length)];

        document.getElementById("status").innerHTML="✅ Key criada com sucesso!";
        document.getElementById("keyText").innerText=key;
        document.getElementById("keyBox").style.display="block";

    },3000);
}

function copiarKey(){

    const key = document.getElementById("keyText").innerText;

    navigator.clipboard.writeText(key);

    alert("Key copiada!");
}

</script>

</body>
</html>
